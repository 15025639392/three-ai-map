<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Tiles Visibility</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #info {
      position: absolute; top: 10px; left: 10px; color: white;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">Testing tiles visibility...</div>
  <script type="module">
    import { GlobeEngine, TerrainTileLayer, RasterTileSource, RasterLayer } from './src/index.ts';
    
    const container = document.body;
    const info = document.getElementById('info');
    
    // Create engine
    const engine = new GlobeEngine({ container, radius: 1 });
    
    // Terrain host (flat for this debug page: extraBounds=[] disables DEM requests)
    const terrain = new TerrainTileLayer('terrain', {
      terrain: {
        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
        encode: 'terrarium',
        minZoom: 3,
        maxZoom: 11,
        tileSize: 256,
        cache: 96,
        extraBounds: []
      },
      meshSegments: 16,
      skirtDepthMeters: 800,
    });

    const imagerySource = new RasterTileSource('gaode-satellite', {
      tiles: ['https://webst01.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}'],
      tileSize: 256,
      cache: 256,
      concurrency: 8
    });
    engine.addSource('gaode-satellite', imagerySource);
    const imageryLayer = new RasterLayer({ id: 'gaode-satellite', source: 'gaode-satellite' });
    
    engine.addLayer(terrain);
    engine.addLayer(imageryLayer);
    
    // Set initial view (Shanghai area)
    engine.setView({ lng: 121.47, lat: 31.23, altitude: 2.0 });
    
    // Wait for tiles to load
    let tileCount = 0;
    setInterval(() => {
      const tiles = terrain.getActiveTileKeys();
      if (tiles.length !== tileCount) {
        tileCount = tiles.length;
        info.textContent = `Loaded ${tileCount} tiles | Keys: ${tiles.join(', ')}`;
        console.log('Active tiles:', tiles);
      }
    }, 1000);
    
    // Expose for debugging
    window.__engine = engine;
    window.__terrain = terrain;
    window.__raster = imageryLayer;
  </script>
</body>
</html>
